<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joule Work Desktop</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: linear-gradient(160deg, #EEF2F8 0%, #E2E6EE 100%);
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', sans-serif;
  }

  .scene {
    position: relative;
    width: 1280px;
    height: 720px;
  }

  .center-card {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 680px;
    border-radius: 14px;
    box-shadow: 0 12px 60px rgba(0,0,0,0.5);
    overflow: hidden;
    z-index: 5;
  }

  .center-card img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 14px;
  }

  .bubble {
    position: absolute;
    background: rgba(20, 10, 45, 0.92);
    border: 1px solid rgba(140, 90, 255, 0.55);
    border-radius: 30px;
    padding: 9px 16px;
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 4px 20px rgba(80, 30, 180, 0.4);
    pointer-events: none;
    z-index: 20;
  }

  .bubble .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #a855f7;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="scene" id="scene">
  <div id="bubble-container" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:20;overflow:visible;"></div>
  <div class="center-card">
    <img src="joule_app.png" alt="Joule Work Desktop">
  </div>
</div>

<script>
  const bubbleTexts = [
    { text: "Write my daily standup",      emoji: "🟡" },
    { text: "Write a follow-up email",      emoji: "📋" },
    { text: "Summarise meeting transcript", emoji: "📄" },
    { text: "Search the web for...",        emoji: "🔍" },
    { text: "Talk to Joule...",             emoji: "🎙️" },
    { text: "Draft a Jira ticket",          emoji: "🎯" },
    { text: "Analyse this CSV file",        emoji: "📊" },
    { text: "Run my standup skill",         emoji: "⚡" },
    { text: "Run ISP T Codes",              emoji: "💻" },
    { text: "Create SAP Macro",             emoji: "🔧" },
    { text: "Approve EDX ticket",           emoji: "✅" },
    { text: "Review this pull request",     emoji: "🔎" },
  ];

  const container = document.getElementById('bubble-container');
  const scene = document.getElementById('scene');
  const activeBubbles = [];
  let usedTexts = [];

  function pickText() {
    if (usedTexts.length >= bubbleTexts.length) usedTexts = [];
    const remaining = bubbleTexts.filter((_, i) => !usedTexts.includes(i));
    const idx = bubbleTexts.indexOf(remaining[Math.floor(Math.random() * remaining.length)]);
    usedTexts.push(idx);
    return bubbleTexts[idx];
  }

  // Fixed spawn slots around the image — mimicking the reference video
  // Scene is 1280x720, card is 680px wide centered
  // Card left edge ~300, right edge ~980, top ~160, bottom ~560
  function getSlots() {
    const sw = scene.offsetWidth;
    const sh = scene.offsetHeight;
    const cw = 680;
    const cl = (sw - cw) / 2;  // ~300
    const cr = cl + cw;         // ~980
    const ct = sh * 0.22;       // ~158
    const cb = sh * 0.78;       // ~562

    return [
      // Left side
      { x: cl - 180, y: sh * 0.25 },
      { x: cl - 200, y: sh * 0.45 },
      { x: cl - 170, y: sh * 0.65 },
      // Right side
      { x: cr + 10,  y: sh * 0.18 },
      { x: cr + 10,  y: sh * 0.38 },
      { x: cr + 10,  y: sh * 0.58 },
      { x: cr + 10,  y: sh * 0.75 },
      // Bottom left
      { x: cl + 20,  y: cb + 10  },
      // Bottom right
      { x: cr - 200, y: cb + 10  },
    ];
  }

  let slotQueue = [];
  function nextSlot() {
    if (slotQueue.length === 0) {
      const slots = getSlots();
      // Shuffle
      slotQueue = slots.sort(() => Math.random() - 0.5);
    }
    return slotQueue.pop();
  }

  function spawnBubble() {
    const slot = nextSlot();
    const b = pickText();

    const el = document.createElement('div');
    el.className = 'bubble';
    el.innerHTML = `<span class="dot"></span><span>${b.emoji}</span>${b.text}`;
    el.style.opacity = 0;
    container.appendChild(el);

    requestAnimationFrame(() => {
      const bw = el.offsetWidth;
      // Right-side bubbles: align left edge to slot x
      // Left-side bubbles: align right edge to slot x
      const x = slot.x < scene.offsetWidth / 2
        ? slot.x - bw  // left side: right-align
        : slot.x;      // right side: left-align

      el.style.left = x + 'px';
      el.style.top = slot.y + 'px';

      activeBubbles.push({
        el,
        x, y: slot.y,
        vy: -(12 + Math.random() * 8),
        vx: slot.x < scene.offsetWidth / 2 ? -(0.5 + Math.random()) : (0.5 + Math.random()),
        opacity: 0,
        phase: 'fadein',
        holdTimer: 3.0 + Math.random() * 2.0,
      });
    });
  }

  let last = null;
  let spawnTimer = 1.0;

  function animate(ts) {
    if (!last) last = ts;
    const dt = Math.min((ts - last) / 1000, 0.05);
    last = ts;

    spawnTimer -= dt;
    if (spawnTimer <= 0) {
      spawnBubble();
      spawnTimer = 1.8 + Math.random() * 1.5;
    }

    for (let i = activeBubbles.length - 1; i >= 0; i--) {
      const b = activeBubbles[i];
      b.x += b.vx * dt;
      b.y += b.vy * dt;

      if (b.phase === 'fadein') {
        b.opacity = Math.min(b.opacity + dt * 2.0, 1);
        if (b.opacity >= 1) b.phase = 'hold';
      } else if (b.phase === 'hold') {
        b.holdTimer -= dt;
        if (b.holdTimer <= 0) b.phase = 'fadeout';
      } else if (b.phase === 'fadeout') {
        b.opacity = Math.max(b.opacity - dt * 0.8, 0);
        if (b.opacity <= 0) {
          b.el.remove();
          activeBubbles.splice(i, 1);
          continue;
        }
      }

      b.el.style.left = b.x + 'px';
      b.el.style.top = b.y + 'px';
      b.el.style.opacity = b.opacity;
    }

    requestAnimationFrame(animate);
  }

  requestAnimationFrame(animate);
</script>
</body>
</html>
